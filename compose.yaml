services:
  web:
    image: node:22-bookworm-slim
    working_dir: /app
    entrypoint:
      - /bin/sh
      - -lc
      - corepack enable && corepack prepare pnpm@latest --activate && exec "$@"
      - --
    command:
      - pnpm
      - dev
      - --hostname
      - 0.0.0.0
    ports:
      - "3000:3000"
    environment:
      WATCHPACK_POLLING: "true"
      PNPM_HOME: /pnpm
      PNPM_STORE_DIR: /pnpm/store
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - pnpm-store:/pnpm/store
    stdin_open: true
    tty: true

volumes:
  node_modules:
  pnpm-store:
